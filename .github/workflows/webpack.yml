name: NodeJS with Webpack

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        node-version: ["20.x", "22.x", "24.x"]

    env:
      CI: "true"
      NODE_ENV: "production"

    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v5
        with:
          node-version: ${{ matrix.node-version }}
          cache: "npm"

      - name: Install dependencies
        run: npm install --no-audit --no-fund --legacy-peer-deps

      - name: Ensure webpack + webpack-cli are installed (no interactive prompts)
        run: npm install -D webpack webpack-cli --no-audit --no-fund

      - name: Build
        run: |
          if npm run build --if-present; then
            exit 0
          fi
          npx webpack
