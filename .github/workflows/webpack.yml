name: NodeJS with Webpack

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node-version: ["20.x", "22.x", "24.x"]

    env:
      CI: "true"

    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: "npm"

      - name: Install dependencies (use npm install to avoid npm ci lockfile errors)
        run: npm install --no-audit --no-fund

      - name: Ensure webpack + webpack-cli are present (no interactive prompt)
        run: npm install -D webpack webpack-cli --no-audit --no-fund

      - name: Build
        run: npm run build --if-present || npx webpack
